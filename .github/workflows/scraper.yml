name: Daily Keyword Scraper

on:
  schedule:
    # 매일 UTC 23:00 (한국 08:00), UTC 09:00 (한국 18:00)
    - cron: '0 23,9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: 파이썬 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 라이브러리 설치
      run: |
        pip install -r requirements.txt

    - name: 크롤러 실행
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
        COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
        NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
        NAVER_AD_ACCESS_KEY: ${{ secrets.NAVER_AD_ACCESS_KEY }}
        NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
      run: |
        python main.py

    - name: 결과물 커밋 및 푸시
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        
        # output 폴더 전체 추가 (data.json + archive_list.json + archives/)
        git add output/
        
        # 변경사항 있을 때만 커밋
        git diff --staged --quiet || git commit -m "🤖 봇: 데이터 및 아카이브 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
        
        # 푸시
        git push origin main
